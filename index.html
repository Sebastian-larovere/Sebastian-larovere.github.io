<!DOCTYPE html>

    <title>Cifrador Cesar</title>
    <link href="index.css" rel="stylesheet " />

    <script src="https://platform.linkedin.com/badges/js/profile.js" async defer type="text/javascript"></script>
</head>
<body>
    <main>
        <h1>Cifrador Cesar.</h1>
        <form id="cifrador" autocomplete="off">
            <input id="input-original" spellcheck="false" placeholder="Ingrese el texto" type="text" name="text">
        </form>
        <div id="resultado"></div>
        <div class="rango">
            <input id="rango" type="range" value="10" min="1" max="20" oninput="this.nextElementSibling.value = this.value">
            <output>10</output>
        </div>
    </main>

    <footer style="display: flex; justify-content: center; margin-top: 20px;">
        <div class="badge-base LI-profile-badge" data-locale="en_US" data-size="medium" data-theme="light" data-type="HORIZONTAL" data-vanity="sebastián-larovere-a7a3a2152" data-version="v1">
            <a class="badge-base__link LI-simple-link" href="https://ar.linkedin.com/in/sebasti%C3%A1n-larovere-a7a3a2152?trk=profile-badge">Sebastián Larovere</a>
        </div>
    </footer>
</body>
</html>
